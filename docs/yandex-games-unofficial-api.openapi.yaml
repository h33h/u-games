components:
  parameters:
    Lang:
      name: lang
      in: query
      schema:
        type: string
        examples: [ru]
    Platform:
      name: platform
      in: query
      schema:
        type: string
        examples: [desktop_other, android_other]
    WithPromos:
      name: with_promos
      in: query
      schema: { type: boolean }
    WithRecentGames:
      name: with_recent_games
      in: query
      schema: { type: boolean }
    GamesCount:
      name: games_count
      in: query
      schema: { type: integer, minimum: 1 }
      examples:
        default: { value: 24 }
    PageId:
      name: page_id
      in: query
      schema: { type: string }
    ClientWidth:
      name: client_width
      in: query
      schema: { type: integer }
    ClientHeight:
      name: client_height
      in: query
      schema: { type: integer }
    Pfid:
      name: pfid
      in: query
      schema: { type: string }
    Query:
      name: query
      in: query
      required: true
      schema: { type: string }
    AppIDCamel:
      name: appID
      in: query
      required: true
      schema: { type: integer }
    AppIdDash:
      name: app-id
      in: query
      required: true
      schema: { type: integer }
    AppIdAny:
      name: appId
      in: query
      required: true
      description: appId observed; app-id was also accepted for some SDK app-purchase endpoints.
      schema: { type: integer }
    Draft:
      name: draft
      in: query
      schema: { type: boolean }
    ReferrerClid:
      name: referrerClid
      in: query
      schema: { type: string }
    LeaderboardName:
