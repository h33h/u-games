name: iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app && xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned .app
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild \
            -project UGames.xcodeproj \
            -scheme UGames \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        id: ipa
        working-directory: ios
        run: |
          set -euo pipefail
          out_dir=build/Build/Products/Release-iphoneos
          test -d "$out_dir/UGames.app" || (echo "App bundle missing"; ls -la "$out_dir"; exit 1)
          rm -rf Payload
          mkdir Payload
          cp -R "$out_dir/UGames.app" Payload/
          ipa_name="u-games-unsigned.ipa"
          zip -qry "$ipa_name" Payload
          rm -rf Payload
          ls -lh "$ipa_name"
          echo "path=ios/$ipa_name" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: error
          retention-days: 30
