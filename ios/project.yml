name: UGames
options:
  bundleIdPrefix: games.yandex.wrap
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_ENTITLEMENTS: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  UGames:
    type: application
    platform: iOS
    sources:
      - path: UGames
        excludes:
          - "Info.plist"
    resources:
      # ios/UGames/Resources/* are symlinks pointing at ../shared/inject/*
      # and ../shared/blocklist/* so Android (assets.srcDirs) and iOS
      # both pull from a single source. XcodeGen with `type: folder`
      # copies the symlink targets, not the symlink itself, so the .app
      # bundle ends up with the latest shared content on every build.
      - path: UGames/Resources
        type: folder
    info:
      path: UGames/Info.plist
      properties:
        CFBundleDisplayName: U-Games
        CFBundleShortVersionString: "0.1.5"
        CFBundleVersion: "6"
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: black
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        LSRequiresIPhoneOS: true
        CFBundleURLTypes:
          - CFBundleURLName: games.yandex.wrap.ugames
            CFBundleURLSchemes:
              - ugames
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: games.yandex.wrap
        INFOPLIST_FILE: UGames/Info.plist
