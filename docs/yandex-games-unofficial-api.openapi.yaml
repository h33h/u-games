openapi: 3.1.0
info:
  title: Yandex Games Unofficial API
  version: 0.1.0
  description: >
    Unofficial, observation-based API specification for Yandex Games catalogue,
    game wrapper, SDK bridge, purchases, player, bonuses, achievements, and
    leaderboard endpoints. This is not an official contract and may change with
    frontend releases. Do not persist CSRF, sdkAuth, session cookies, recovery
    codes, signed payloads, or user identifiers from live traffic.
  x-observed-date: "2026-05-17"
  x-observed-from:
    - https://yandex.ru/games/
    - https://yandex.ru/games/category/puzzles
    - https://yandex.ru/games/search
    - https://yandex.ru/games/app/fireboy-and-watergirl-1-in-the-forest-temple-96860
    - https://yandex.ru/games/app/kiker-96247
servers:
  - url: https://yandex.ru
    description: Main catalogue/page origin.
  - url: https://games.yandex.ru
    description: Games backend origin.
  - url: https://games-sdk.yandex.ru
    description: SDK backend origin.
tags:
  - name: Catalogue
  - name: Game Details
  - name: Reviews
  - name: User
  - name: External
  - name: SDK Player
  - name: SDK Purchases
  - name: SDK Bonuses
  - name: SDK Leaderboards
  - name: SDK Achievements
  - name: SDK Helpers
  - name: Mutating

paths:
  /games/api/catalogue/v2/feed/:
    get:
      tags: [Catalogue]
      operationId: getCatalogueFeedV2
      summary: Read catalogue feed blocks.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/WithPromos"
        - $ref: "#/components/parameters/WithRecentGames"
        - $ref: "#/components/parameters/GamesCount"
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/ClientWidth"
        - $ref: "#/components/parameters/ClientHeight"
        - $ref: "#/components/parameters/Pfid"
        - name: categorized_size
          in: query
          schema: { type: integer }
        - name: tagID
          in: query
          schema: { type: integer }
        - name: rtx-reqid
          in: query
          schema: { type: string }
        - name: suggested_width
          in: query
          schema: { type: integer }
        - name: suggested_rows
          in: query
          schema: { type: integer }
        - name: tab
          in: query
          schema: { type: string }
          examples:
            puzzles: { value: puzzles }
        - name: with_faq
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Feed payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
      x-observed:
        status: [200]
        notes:
          - Home and category pages use this endpoint.
          - Page cursors can be base64 strings such as gamesSkip=24.

  /games/api/catalogue/v2/feed_home/:
    get:
      tags: [Catalogue]
      operationId: getCatalogueFeedHomeV2
      summary: Feature-flagged or stale feed home endpoint.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
      responses:
        "200":
          description: Feed payload when enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "404":
          description: Observed from direct anonymous production request.
      x-observed:
        status: [404]
        notes:
          - The endpoint exists in frontend bundle as getFeedHomeData(params).

  /games/api/catalogue/v3/search/:
    get:
      tags: [Catalogue]
      operationId: searchCatalogueV3
      summary: Search games.
      parameters:
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/WithPromos"
        - $ref: "#/components/parameters/GamesCount"
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/ClientWidth"
        - $ref: "#/components/parameters/ClientHeight"
        - name: found_width
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Search result feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
      x-observed:
        status: [200]
        notes:
          - Current web catalogue used v3 search in observed release.

  /games/api/catalogue/v3/search/suggest:
    get:
      tags: [Catalogue]
      operationId: suggestCatalogueSearchV3
      summary: Search suggestions.
      parameters:
        - $ref: "#/components/parameters/Query"
        - name: numdoc
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
          examples:
            five: { value: 5 }
      responses:
        "200":
          description: Suggestion list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  query: { type: string }
                  suggests:
                    type: array
                    items: { type: string }
                additionalProperties: true
        "400":
          description: Missing or invalid required params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-observed:
        status: [200, 400]
        notes:
          - numdoc was required in the observed release.

  /games/api/catalogue/v2/all_games/:
    get:
      tags: [Catalogue]
      operationId: listAllGamesV2
      summary: Read paged all-games catalogue.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/GamesCount"
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: Paged games list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GameCard"
                  pageID: { type: string }
                  totalPages: { type: integer }
                additionalProperties: true

  /games/api/catalogue/v2/best_games/:
    get:
      tags: [Catalogue]
      operationId: listBestGamesV2
      summary: Read best-games list.
      parameters:
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: Best games payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dateModified: { type: string }
                  faqLinks:
                    type: array
                    items: { type: object, additionalProperties: true }
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/GameCard"
                  month: { type: integer }
                  stat:
                    type: object
                    properties:
                      rating: { type: number }
                      ratingCount: { type: integer }
                    additionalProperties: true
                  year: { type: integer }
                additionalProperties: true

  /games/api/catalogue/v2/all_promos/:
    get:
      tags: [Catalogue]
      operationId: listAllPromosV2
      summary: Read catalogue-wide promos.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: Promo page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  promos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Promo"
                  pageID: { type: string }
                  totalPages: { type: integer }
                additionalProperties: true

  /games/api/app-promos/v1:
    get:
      tags: [Catalogue]
      operationId: listAppPromosV1
      summary: Read promos for one app.
      parameters:
        - name: app_id
          in: query
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - name: limit
          in: query
          schema: { type: integer }
        - name: min_play_time
          in: query
          schema: { type: integer }
        - name: promo_filter
          in: query
          schema: { type: string }
        - name: sort_type
          in: query
          schema: { type: string }
        - name: with_future
          in: query
          schema: { type: boolean }
        - name: future_promos_placement
          in: query
          schema: { type: string }
      responses:
        "200":
          description: App promos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  promos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Promo"
                additionalProperties: true
      x-observed:
        status: [200]
        notes:
          - Apps 96860 and 211144 returned an empty promos array.

  /games/api/catalogue/v2/get_game:
    post:
      tags: [Game Details]
      operationId: getGameV2
      summary: Read rich game details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetGameRequestCamel"
      responses:
        "200":
          description: Game detail payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGameResponse"
        "400":
          description: Missing or invalid required body fields.
      x-observed:
        status: [200, 400]
        notes:
          - Live check on 2026-05-17 accepted {"appID":96860,"format":"app"}.
          - Live check on 2026-05-17 returned 400 for {"app_id":96860,"format":"app","platform":"android_other"}.
          - Response includes sdkAuth; do not persist it.

  /games/api/catalogue/v2/get_games:
    post:
      tags: [Game Details]
      operationId: getGamesV2
      summary: Read rich details for multiple games.
      parameters:
        - $ref: "#/components/parameters/Lang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appIDs, format]
              properties:
                appIDs:
                  type: array
                  items: { type: integer }
                format:
                  type: string
                  examples: [app]
                draft: { type: boolean }
                pfid: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Batch game details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/GameCard"
                additionalProperties: true

  /games/api/catalogue/v2/developer_games:
    get:
      tags: [Game Details]
      operationId: getDeveloperGamesV2
      summary: Read games by developer.
      parameters:
        - name: developer_id
          in: query
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/GamesCount"
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: Developer games feed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  developer:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      shareImage: { type: string }
                    additionalProperties: true
                  feed:
                    $ref: "#/components/schemas/FeedBlock"
                  gamesRequestId: { type: string }
                  gamesWithPromos:
                    type: array
                    items:
                      $ref: "#/components/schemas/GameCard"
                  pageInfo: { type: object, additionalProperties: true }
                  totalGamesCount: { type: integer }
                additionalProperties: true
        "400":
          description: Missing or invalid developer_id.
      x-observed:
        notes:
          - developer_id is required; developerId, id, and developer name failed.

  /games/api/catalogue/v2/is_game_rated:
    get:
      tags: [Reviews]
      operationId: isGameRatedV2
      summary: Read current user's rating state.
      parameters:
        - $ref: "#/components/parameters/AppIDCamel"
      responses:
        "200":
          description: Rating state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasAuth: { type: boolean }
                  rated: { type: boolean }
                additionalProperties: true

  /games/api/catalogue/v2/get_game_reviews:
    get:
      tags: [Reviews]
      operationId: getGameReviewsV2
      summary: Read game reviews.
      parameters:
        - $ref: "#/components/parameters/AppIDCamel"
      responses:
        "200":
          description: Review list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasAuth: { type: boolean }
                  reviews:
                    type: array
                    items:
                      $ref: "#/components/schemas/Review"
                additionalProperties: true

  /games/api/catalogue/v2/ratings:
    post:
      tags: [Reviews, Mutating]
      operationId: postGameRatingV2
      summary: Post a rating or review.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appID, rating]
              properties:
                appID: { type: integer }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Rating accepted.
        "401":
          description: Authentication required.
      x-mutating: true
      x-executed: false

  /games/api/catalogue/v2/similar_games/:
    get:
      tags: [Catalogue]
      operationId: getSimilarGamesV2
      summary: Read games similar to an app.
      parameters:
        - name: app_id
          in: query
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/GamesCount"
        - name: int
          in: query
          schema: { type: boolean }
        - $ref: "#/components/parameters/Lang"
        - name: page_type
          in: query
          schema: { type: string }
          examples:
            game: { value: game }
        - $ref: "#/components/parameters/Platform"
        - name: standalone
          in: query
          schema: { type: boolean }
        - $ref: "#/components/parameters/Pfid"
      responses:
        "200":
          description: Similar games feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"

  /games/api/catalogue/v2/tags/:
    get:
      tags: [Catalogue]
      operationId: getTagsV2
      summary: Read game tags.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Pfid"
      responses:
        "200":
          description: Tags payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"

  /games/api/catalogue/v2/user_info:
    get:
      tags: [User]
      operationId: getCatalogueUserInfoV2
      summary: Read catalogue subscriptions and optional settings.
      parameters:
        - name: settings
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: User info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: object
                    additionalProperties: true
                  settings:
                    type: object
                    additionalProperties: true
                additionalProperties: true
        "401":
          description: Authentication cookie missing or rejected.
      x-observed:
        status: [200, 401]
        notes:
          - In an authenticated browser session this returned subscriptions only.
          - With settings=true this returned subscriptions and settings.ui.theme_type.
          - This endpoint did not return profile fields such as uid, login, or displayName.

  /games/api/user/passport:
    get:
      tags: [User]
      operationId: getUserPassport
      summary: Read richer signed-in passport profile.
      responses:
        "200":
          description: Passport profile. Contains personal fields; redact logs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountIdUrl: { type: string }
                  authProvider: { type: string }
                  avatarId: { type: string }
                  avatarsOrigin: { type: string }
                  displayName: { type: string }
                  email: { type: string }
                  fio: { type: string }
                  helpUrl: { type: string }
                  isAccountCompletionAvailable: { type: boolean }
                  isChild: { type: boolean }
                  login: { type: string }
                  origin: { type: string }
                  passportHost: { type: string }
                  tld: { type: string }
                  uid: { type: string }
                  yandexoid: { type: string }
                  yaplusEnabled: { type: boolean }
                  yaplusIsAvailable: { type: boolean }
                additionalProperties: true
      x-observed:
        status: [200]
        notes:
          - Anonymous requests can still return 200 with empty uid/login/displayName.
          - Treat the user as authorized only when uid is non-empty.
          - Avatar image URLs can be built as avatarsOrigin + /get-yapic/{avatarId}/islands-200.
      x-sensitive-fields: [email, fio, login, uid, yandexoid, displayName]

  /games/api/user-notifications/v1:
    get:
      tags: [User]
      operationId: getUserNotificationsV1
      summary: Read notification list.
      parameters:
        - $ref: "#/components/parameters/Lang"
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Notifications page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items: { type: object, additionalProperties: true }
                  total_count: { type: integer }
                  unread_count: { type: integer }
                additionalProperties: true

  /games/api/catalogue/v2/userflags:
    get:
      tags: [User]
      operationId: getUserFlagsV2
      summary: Read user flags.
      responses:
        "200":
          description: User flags.
          content:
            application/json:
              schema:
                type: object
                properties:
                  flags:
                    type: object
                    properties:
                      forbidPermissionsForAllApps: { type: boolean }
                      forbidSharePurchasesInfo: { type: boolean }
                    additionalProperties: true
                additionalProperties: true

  /games/api/catalogue/v2/user_settings:
    patch:
      tags: [User, Mutating]
      operationId: patchUserSettingsV2
      summary: Update catalogue user settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UIThemeType: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Settings updated.
      x-mutating: true
      x-executed: false

  /games/api/catalogue/v2/unsubscribes:
    get:
      tags: [User]
      operationId: getUnsubscribesV2
      summary: Read unsubscribe list.
      responses:
        "200":
          description: Unsubscribe list.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }

  /games/api/catalogue/v2/subscribe:
    post:
      tags: [User, Mutating]
      operationId: subscribeV2
      summary: Subscribe to a notification type.
      requestBody:
        $ref: "#/components/requestBodies/SubscriptionType"
      responses:
        "200":
          description: Subscription changed.
      x-mutating: true
      x-executed: false

  /games/api/catalogue/v2/unsubscribe:
    post:
      tags: [User, Mutating]
      operationId: unsubscribeV2
      summary: Unsubscribe from a notification type.
      requestBody:
        $ref: "#/components/requestBodies/SubscriptionType"
      responses:
        "200":
          description: Subscription changed.
      x-mutating: true
      x-executed: false

  /games/api/external/catalogue/v3/recent-games/:
    post:
      tags: [External, Mutating]
      operationId: addRecentGameV3
      summary: Add current app to recent games.
      requestBody:
        $ref: "#/components/requestBodies/AppIDBody"
      responses:
        "204":
          description: Added.
      x-mutating: true
      x-observed:
        status: [204]
        notes:
          - Normal game page launch made this call.
    delete:
      tags: [External, Mutating]
      operationId: deleteRecentGameV3
      summary: Remove current app from recent games.
      requestBody:
        $ref: "#/components/requestBodies/AppIDBody"
      responses:
        "204":
          description: Removed.
      x-mutating: true
      x-executed: false

  /games/api/external/catalogue/v3/play-time/:
    get:
      tags: [External]
      operationId: getExternalPlayTimeV3
      summary: Read aggregate play time.
      responses:
        "200":
          description: Play time payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  play_time: { type: integer }
                additionalProperties: true

  /games/api/catalogue/v2/partner_event/:
    get:
      tags: [Catalogue]
      operationId: getPartnerEventFeedV2
      summary: Read partner-event feed.
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Platform"
      responses:
        "200":
          description: Partner-event feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "400":
          description: Missing name.
      x-observed:
        status: [400]
        notes:
          - Direct request without name returned 400.

  /games/api/partner-events/v1/user_partner_event:
    get:
      tags: [User]
      operationId: getUserPartnerEventV1
      summary: Read current user partner-event state.
      parameters:
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: User event state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "204":
          description: No active state.
      x-observed:
        status: [204]

  /games/api/catalogue/v2/conflict_info:
    get:
      tags: [User]
      operationId: getConflictInfoV2
      summary: Read account/app conflict information.
      parameters:
        - name: app_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conflict state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasConflict: { type: boolean }
                  conflictInfo:
                    type: object
                    properties:
                      iGamesUsers:
                        type: array
                        items: { type: object, additionalProperties: true }
                    additionalProperties: true
                additionalProperties: true
        "400":
          description: Missing or invalid app_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/api/csrf/v1/token:
    get:
      tags: [SDK Helpers]
      operationId: getCsrfTokenV1
      summary: Initialize or refresh CSRF token.
      responses:
        "204":
          description: Empty body observed.
      x-sensitive: true
      x-observed:
        status: [204]

  /games/api/purchases/v1/currency/balance:
    get:
      tags: [SDK Purchases]
      operationId: getPublicCurrencyBalanceV1
      summary: Read currency balance through games backend.
      responses:
        "200":
          $ref: "#/components/responses/CurrencyBalance"

  /games/api/sdk/v1/currency/balance:
    get:
      tags: [SDK Purchases]
      operationId: getSdkCurrencyBalanceV1
      summary: Read currency balance through SDK backend.
      responses:
        "200":
          $ref: "#/components/responses/CurrencyBalance"

  /games/api/purchases/v1/platform/products:
    get:
      tags: [SDK Purchases]
      operationId: getPlatformProductsV1
      summary: Read platform purchase products.
      parameters:
        - name: appId
          in: query
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: Product list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        info: { type: object, additionalProperties: true }
                        subscription: { type: object, additionalProperties: true }
                      additionalProperties: true
                additionalProperties: true

  /games/api/purchases/v1/currency/products:
    get:
      tags: [SDK Purchases]
      operationId: getPublicCurrencyProductsV1
      summary: Read currency purchase products.
      parameters:
        - name: appId
          in: query
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
        - name: amount
          in: query
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/CurrencyProducts"

  /games/api/sdk/v1/purchases/currency/products:
    get:
      tags: [SDK Purchases]
      operationId: getSdkCurrencyProductsV1
      summary: Read currency purchase products through SDK backend.
      parameters:
        - name: appId
          in: query
