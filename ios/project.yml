name: UGames
options:
  bundleIdPrefix: games.yandex.wrap
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_ENTITLEMENTS: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  UGames:
    type: application
    platform: iOS
    sources:
      - path: UGames
        excludes:
          - "Info.plist"
    resources:
      # Pull inject scripts + blocklist directly from shared/ — the local
      # copies under UGames/Resources/ used to drift (the iOS sdk-stub
      # was 5 days stale and missed every diagnostic update). Android
      # already does this via assets.srcDirs("../../shared/inject").
      # Files are added individually (no `type: folder`) so
      # Bundle.main.url(forResource:withExtension:) finds them at the top
      # level of the .app bundle, matching how InjectedScripts.swift and
      # BlockList.swift look them up today.
      - path: ../shared/inject/honest-path.js
      - path: ../shared/inject/pwa-mode.js
      - path: ../shared/inject/pwa-mode.css
      - path: ../shared/inject/ya-sdk-stub.js
      - path: ../shared/blocklist/ad-domains.txt
    info:
      path: UGames/Info.plist
      properties:
        CFBundleDisplayName: U-Games
        CFBundleShortVersionString: "0.1.5"
        CFBundleVersion: "6"
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: black
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        LSRequiresIPhoneOS: true
        CFBundleURLTypes:
          - CFBundleURLName: games.yandex.wrap.ugames
            CFBundleURLSchemes:
              - ugames
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: games.yandex.wrap
        INFOPLIST_FILE: UGames/Info.plist
